name: "leosac-credential-provisioning"
services:
  cps:
    build: ./cps
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - ./cps/data:/data
      - ./cps/appsettings.Production.json:/app/appsettings.Production.json
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - TZ=Europe/Paris
    restart: always
    mem_limit: 4g
    cpus: 0.50
    healthcheck:
      test: "bash -c 'printf \"GET / HTTP/1.1\n\n\" > /dev/tcp/127.0.0.1/5000; exit $?;'"
      interval: 120s
      timeout: 30s
      retries: 3
      start_period: 30s
    secrets:
      - cps_secret_key
      - cpw_api_key
  cpw:
    image: "leosac/leosac-card-printing-worker:latest"
    init: true
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ./cpw/repository:/data/repository
      - ./cpw/logs:/data/logs
    environment:
      - HOSTNAME=0.0.0.0
      - API_KEY_FILE=/run/secrets/cpw_api_key
      - SECRET_KEY_FILE=/run/secrets/cpw_secret_key
      - LOGGING_TYPE=file,console
      - LOGGING_LEVEL=info
      - LOGGING_DIRECTORY=/data/logs
      - TZ=Europe/Paris
    restart: always
    mem_limit: 4g
    cpus: 0.25
    healthcheck:
      test: "bash -c 'printf \"GET / HTTP/1.1\n\n\" > /dev/tcp/127.0.0.1/4000; exit $?;'"
      interval: 120s
      timeout: 30s
      retries: 3
      start_period: 30s
    secrets:
      - cpw_secret_key
      - cpw_api_key
  cew:
    image: "leosac/leosac-card-encoding-worker:latest"
    ports:
      - "127.0.0.1:5100:5100"
    volumes:
      - ./cew/repository:/data/repository
      - ./cew/logs:/data/logs
      - ./cew/appsettings.Production.json:/app/appsettings.Production.json
    environment:
      - TZ=Europe/Paris
    restart: always
    mem_limit: 4g
    cpus: 0.25
    healthcheck:
      test: "bash -c 'printf \"GET / HTTP/1.1\n\n\" > /dev/tcp/127.0.0.1/5100; exit $?;'"
      interval: 120s
      timeout: 30s
      retries: 3
      start_period: 30s
    secrets:
      - cew_secret_key
      - cew_api_key
secrets:
  cpw_api_key:
    file: secrets/cpw_api_key.txt
  cpw_secret_key:
    file: secrets/cpw_secret_key.txt
  cps_secret_key:
    file: secrets/cps_secret_key.txt
  cew_api_key:
    file: secrets/cew_api_key.txt
  cew_secret_key:
    file: secrets/cew_secret_key.txt